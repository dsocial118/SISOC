services:
  django:
    build:
      context: .
      dockerfile: ./docker/django/Dockerfile
    env_file:
      - .env
    environment:
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - .:/sisoc/
    restart: unless-stopped
    ports:
      - "8001:8000"

  ocr_worker:
    build:
      context: .
      dockerfile: ./docker/django/Dockerfile
    env_file:
      - .env
    environment:
      TZ: America/Argentina/Buenos_Aires
      DJANGO_SERVICE_ROLE: ocr_worker
    volumes:
      - .:/sisoc/
    restart: unless-stopped
