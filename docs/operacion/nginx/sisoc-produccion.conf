# Configuracion NGINX de referencia para produccion.
#
# Topologia esperada:
# - SISOC checkout: /srv/sisoc/SISOC
# - SISOC-Mobile checkout: /srv/sisoc/SISOC-Mobile
# - Django/Gunicorn publicado por Docker en 127.0.0.1:8001
# - SISOC-Mobile publicado por Docker en 127.0.0.1:8080
# - SISOC-Mobile servido externamente bajo /mobile/
#
# Requiere que el bloque http global defina la zona limit_req "default".

# 80 -> HTTPS canonical
server {
    listen 80;
    server_name com.sisoc.secretarianaf.gob.ar sisoc.secretarianaf.gob.ar;
    return 301 https://sisoc.secretarianaf.gob.ar$request_uri;
}

# 443 para com.sisoc -> canonical
server {
    listen 443 ssl http2;
    server_name com.sisoc.secretarianaf.gob.ar;

    ssl_certificate     /etc/apache2/certs/fullchain.crt;
    ssl_certificate_key /etc/apache2/certs/secretarianaf.gob.ar.key;

    return 301 https://sisoc.secretarianaf.gob.ar$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sisoc.secretarianaf.gob.ar;

    ssl_certificate     /etc/apache2/certs/fullchain.crt;
    ssl_certificate_key /etc/apache2/certs/secretarianaf.gob.ar.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 500M;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    access_log /srv/sisoc/logs/nginx/SISOC-ssl-access.log;
    error_log  /srv/sisoc/logs/nginx/SISOC-ssl-error.log;

    location /static/ {
        alias /srv/sisoc/SISOC/static_root/;
        try_files $uri =404;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location /media/ {
        alias /srv/sisoc/SISOC/media/;
        try_files $uri =404;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location = /mobile {
        return 301 /mobile/;
    }

    location /mobile/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_redirect off;
    }

    location / {
        limit_req zone=default burst=40 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  443;

        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header Cookie $http_cookie;

        proxy_redirect off;
    }
}
