{% load static %}
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
              rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
              crossorigin="anonymous" />
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
        <link rel="stylesheet" href="{% static 'custom/css/main.css' %}" />
        <link rel="stylesheet" href="{% static 'custom/css/login.css' %}" />
        <link rel="stylesheet" href="{% static 'custom/css/password_reset.css' %}" />
        <link rel="stylesheet" href="{% static 'custom/css/utils.css' %}" />
        <title>
            {% block page_title %}{% endblock %}
        </title>
    </head>
    <body class="password-reset-page">
        {% include 'includes/header.html' %}
        <div class="login-container">
            <div class="container">
                <div class="row password-reset-row align-items-center">
                    <div class="col-lg-9 col-12 mx-auto">
                        <div class="row align-items-center">
                            <div class="col-md-5 col-12">
                                <div class="card">
                                    <div class="card-body text-center">
                                        <img src="{% static 'custom/img/presidencia_logo.svg' %}"
                                             class="mb-2 presidencia-logo"
                                             alt="" />
                                        <img src="{% static 'custom/img/sisoc_azul.png' %}"
                                             alt=""
                                             class="img-fluid sisoc-logo" />
                                        <div class="mt-3 password-reset-content">
                                            {% block card_content %}{% endblock %}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-7 d-none d-md-block">
                                <img src="{% static 'custom/img/loginPresentacion.svg' %}"
                                     alt="logoPresentacion"
                                     class="img-fluid" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% include "includes/footer.html" %}
    </body>
</html>
