name: Formateo y linteo

on:
    pull_request:
        branches:
            - main
            - development
    push:
        branches:
            - main
            - development

jobs:
    setup:
        runs-on: ubuntu-latest
        outputs:
            python-version: ${{ steps.python-version.outputs.python-version }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.7

            - name: Set up Python
              id: python-version
              uses: actions/setup-python@v5.2.0
              with:
                  python-version: '3.11.9'

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install black==24.8.0 djlint pylint
              id: install-dependencies

    encoding_check:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.7
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5.2.0
              with:
                  python-version: ${{ needs.setup.outputs.python-version }}

            - name: Detect mojibake in changed text files
              run: |
                  python - <<'PY'
                  import json
                  import os
                  import subprocess
                  from pathlib import Path

                  EXCLUDED_DIRS = {
                      ".git",
                      ".venv",
                      "__pycache__",
                      "node_modules",
                      "staticfiles",
                      "media",
                  }
                  EXCLUDED_SUFFIXES = {
                      ".png", ".jpg", ".jpeg", ".gif", ".svg", ".ico", ".webp",
                      ".woff", ".woff2", ".ttf", ".eot", ".pdf", ".zip",
                      ".sqlite3", ".pyc", ".pyo",
                  }
                  EXCLUDED_FILENAMES = {
                      "package-lock.json",
                      "poetry.lock",
                  }
                  PATTERNS = (
                      "\u00c3\u00a1", "\u00c3\u00a9", "\u00c3\u00ad",
                      "\u00c3\u00b3", "\u00c3\u00ba", "\u00c3\u00b1",
                      "\u00c3\u0081", "\u00c3\u0089", "\u00c3\u008d",
                      "\u00c3\u0093", "\u00c3\u009a", "\u00c3\u0091",
                      "\u00c2\u00bf", "\u00c2\u00a1", "\u00c2\u00b0",
                      "\u00e2\u20ac\u2122", "\u00e2\u20ac\u0153",
                      "\u00e2\u20ac\u009d", "\u00e2\u20ac\u201c",
                      "\u00e2\u20ac\u201d",
                  )

                  event_name = os.environ["GITHUB_EVENT_NAME"]
                  event_path = os.environ["GITHUB_EVENT_PATH"]
                  with open(event_path, encoding="utf-8") as fh:
                      event = json.load(fh)

                  if event_name == "pull_request":
                      base_sha = event["pull_request"]["base"]["sha"]
                      head_sha = event["pull_request"]["head"]["sha"]
                  elif event_name == "push":
                      base_sha = event["before"]
                      head_sha = event["after"]
                  else:
                      raise SystemExit(f"Unsupported event: {event_name}")

                  changed_output = subprocess.check_output(
                      ["git", "diff", "--name-only", base_sha, head_sha],
                      text=True,
                  )
                  changed_files = [
                      Path(item.strip())
                      for item in changed_output.splitlines()
                      if item.strip()
                  ]

                  if not changed_files:
                      print("No changed files to scan for mojibake.")
                      raise SystemExit(0)

                  findings = []
                  for path in changed_files:
                      if not path.is_file():
                          continue
                      if any(part in EXCLUDED_DIRS for part in path.parts):
                          continue
                      if path.name in EXCLUDED_FILENAMES:
                          continue
                      if path.suffix.lower() in EXCLUDED_SUFFIXES:
                          continue

                      try:
                          text = path.read_text(encoding="utf-8")
                      except UnicodeDecodeError:
                          continue

                      for line_number, line in enumerate(text.splitlines(), start=1):
                          matches = [pattern for pattern in PATTERNS if pattern in line]
                          if matches:
                              findings.append(
                                  f"{path}:{line_number}: suspicious patterns {matches} -> {line.strip()}"
                              )

                  if findings:
                      print("Possible mojibake sequences detected:")
                      for finding in findings:
                          print(finding)
                      raise SystemExit(1)

                  print("No typical mojibake patterns were found in changed text files.")
                  PY

    black:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.7

            - name: Set up Python
              uses: actions/setup-python@v5.2.0
              with:
                  python-version: ${{ needs.setup.outputs.python-version }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install black==24.8.0

            - name: Run Black
              run: black --check . --config pyproject.toml

            - name: Upload Black report
              if: failure()
              uses: actions/upload-artifact@v4.4.0
              with:
                  name: black-report
                  path: |
                      **/*.py

    djlint:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.7

            - name: Set up Python
              uses: actions/setup-python@v5.2.0
              with:
                  python-version: ${{ needs.setup.outputs.python-version }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install djlint==1.34.2

            - name: Run DJLint
              run: |
                  djlint . --check --configuration=.djlintrc

    pylint:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.7

            - name: Set up Python
              uses: actions/setup-python@v5.2.0
              with:
                  python-version: ${{ needs.setup.outputs.python-version }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements/base.txt -r requirements/dev.txt

            - name: Run pylint
              run: |
                  pylint **/*.py --rcfile=.pylintrc
