name: Escaneo de secretos

on:
    pull_request:
        branches:
            - main
            - development
    push:
        branches:
            - main
            - development

jobs:
    gitleaks:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v6.0.2

            - name: Descargar gitleaks
              run: |
                  curl -sSL \
                    https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
                    -o gitleaks.tar.gz
                  tar -xzf gitleaks.tar.gz gitleaks
                  chmod +x gitleaks

            - name: Ejecutar escaneo de secretos (working tree)
              run: |
                  ./gitleaks detect \
                    --source . \
                    --no-git \
                    --config .gitleaks.toml \
                    --gitleaks-ignore-path .gitleaksignore \
                    --redact \
                    --verbose
