{% extends "includes/main.html" %}

{% block title %}Eliminar Trabajador{% endblock %}
{% block titulo-pagina %}Eliminar Trabajador{% endblock %}

{% block content %}
    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="mb-3">
                    <i class="fas fa-exclamation-triangle text-danger me-2"></i>Eliminar trabajador
                </h3>
                <p class="mb-4">
                    ¿Está seguro que desea eliminar a <strong>{{ trabajador }}</strong>?
                </p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                    <a href="{% url 'centrodeinfancia_detalle' trabajador.centro_id %}"
                       class="btn btn-secondary btn-sm">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
