{% extends "includes/main.html" %}
{% load static custom_filters %}
{% block head %}
    <link rel="stylesheet" href="{% static 'custom/css/inicio.css' %}" />
{% endblock %}
{% block breadcrumb %}{% endblock %}
{% block content %}
    <div class="inicio-presentacion {% if user|has_any_group:'CFP,CFPJuridicccion,CFPINET' %}inicio-presentacion--inet{% else %}inicio-presentacion--default{% endif %}">
        <div class="card-body d-flex align-items-center justify-content-center">
            {% if user|has_any_group:'CFP,CFPJuridicccion,CFPINET' %}
                <div class="inicio-presentacion__inet-card">
                    <img src="{% static 'custom/img/LOGOS-INET-SE_BLANCO.png' %}"
                         alt="INET Secretaría de Educación"
                         class="inicio-presentacion__inet-logo" />
                </div>
            {% endif %}
        </div>
    </div>
{% endblock %}
