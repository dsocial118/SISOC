{% extends "includes/main.html" %}

{% block title %}Eliminar sede VPSL{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-12 col-lg-8 offset-lg-2">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title mb-0">Eliminar sede</h3>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="card-body">
                        <div class="alert alert-warning mb-0">
                            Confirme la eliminacion logica de la sede <strong>{{ object.nombre }}</strong>.
                        </div>
                    </div>
                    <div class="card-footer d-flex justify-content-end gap-2">
                        <a href="{% url 'vpsl_sede_list' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
